<!doctype html>
<html lang="en" class="dark" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#141414" />
    <title>HOPI · One-person operating system</title>
    <style data-hopi-boot>
      :root { color-scheme: dark; }
      html, body, #root { width: 100%; height: 100%; min-height: 100%; }
      body { margin: 0; background: var(--bg, Canvas); color: CanvasText; }
      .app-boot {
        display: grid;
        width: 100%;
        height: 100%;
        grid-template-rows: 72px minmax(0, 1fr);
        overflow: hidden;
        background: var(--bg, Canvas);
        font: 14px/1.5 Inter, ui-sans-serif, system-ui, sans-serif;
      }
      .app-boot__header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 max(16px, env(safe-area-inset-left));
        background: color-mix(in srgb, CanvasText 2%, Canvas);
        box-shadow: 0 12px 30px color-mix(in srgb, Canvas 72%, transparent);
      }
      .app-boot__mark {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 11px;
        background: color-mix(in srgb, CanvasText 9%, Canvas);
        color: color-mix(in srgb, CanvasText 82%, Canvas);
        font-size: 13px;
        font-weight: 800;
      }
      .app-boot__brand { display: grid; gap: 1px; }
      .app-boot__brand strong { font-size: 13px; letter-spacing: .04em; }
      .app-boot__brand small,
      .app-boot__content small {
        color: color-mix(in srgb, CanvasText 44%, Canvas);
        font-size: 10px;
      }
      .app-boot__content {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 7px;
        padding: 24px;
        text-align: center;
      }
      .app-boot__pulse {
        width: 9px;
        height: 9px;
        margin-bottom: 8px;
        border-radius: 999px;
        background: color-mix(in srgb, CanvasText 58%, Canvas);
        box-shadow: 0 0 18px color-mix(in srgb, CanvasText 22%, transparent);
        animation: hopi-boot-breathe 1.8s ease-in-out infinite;
      }
      .app-boot__content strong { font-size: 13px; font-weight: 680; }
      @keyframes hopi-boot-breathe {
        0%, 100% { opacity: .35; transform: scale(.82); }
        50% { opacity: .9; transform: scale(1); }
      }
      @media (max-width: 660px) {
        .app-boot { pointer-events: none; }
        .app-boot__content {
          position: fixed;
          z-index: 2;
          right: max(12px, env(safe-area-inset-right));
          bottom: max(12px, env(safe-area-inset-bottom));
          width: auto;
          height: auto;
          min-height: 0;
          flex-direction: row;
          gap: 7px;
          padding: 9px 11px;
          border-radius: 12px;
          background: color-mix(in srgb, CanvasText 7%, Canvas);
          box-shadow: 0 12px 30px color-mix(in srgb, Canvas 58%, transparent);
          backdrop-filter: blur(12px);
          text-align: left;
        }
        .app-boot__pulse { margin: 0; }
        .app-boot__content strong { font-size: 10px; }
        .app-boot__content small { display: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-boot__pulse { animation: none; opacity: .7; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot" role="status" aria-live="polite" aria-label="Opening HOPI">
        <header class="app-boot__header">
          <span class="app-boot__mark" aria-hidden="true">H</span>
          <span class="app-boot__brand">
            <strong>HOPI</strong>
            <small>one-person operating system</small>
          </span>
        </header>
        <main class="app-boot__content">
          <span class="app-boot__pulse" aria-hidden="true"></span>
          <strong>Opening workspace</strong>
          <small>Loading the interface for this device…</small>
        </main>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
